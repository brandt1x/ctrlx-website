<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<script>(function(){if(typeof localStorage!=='undefined'&&localStorage.getItem('theme')==='light')document.documentElement.classList.add('theme-light');})();</script>
	<title>Checkout — Control-X</title>
	<meta name="description" content="Secure Control-X checkout." />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="checkout.css">
	<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>
	<canvas id="site-canvas-bg" class="site-canvas-bg" aria-hidden="true"></canvas>
	<div class="site-vignette" aria-hidden="true"></div>

	<header class="site-header">
		<div class="container header-inner">
			<a href="index.html" class="logo-link">
				<img src="images/logo.new.png" alt="CTRLX Logo" class="logo-image logo-dark" width="656" height="204" />
				<img src="images/whitelogo.new.png" alt="CTRLX Logo" class="logo-image logo-light" width="982" height="302" />
			</a>
			<button class="mobile-menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
				<span class="hamburger-line"></span>
				<span class="hamburger-line"></span>
				<span class="hamburger-line"></span>
			</button>
			<div class="header-right">
				<nav class="nav-left">
					<a href="services.html">Services</a>
					<a href="zen-scripts.html">Zen Scripts</a>
				</nav>
				<a href="ultimate.html" class="nav-ultimate nav-center-link">ULTIMATE</a>
				<div class="header-actions">
					<a href="account.html" class="btn account-interface-btn">Account</a>
					<a href="contact.html" class="btn">Contact</a>
					<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light mode">
						<span class="theme-toggle-switch">
							<span class="theme-icon theme-icon-dark">&#9789;</span>
							<span class="theme-icon theme-icon-light">&#9728;</span>
						</span>
					</button>
				</div>
			</div>
		</div>
	</header>

	<main class="page-main checkout-page">
		<section class="container checkout-wrap">
			<div class="checkout-intro">
				<p class="page-kicker">Secure Checkout</p>
				<h2 class="page-title">Complete Your Order</h2>
				<p class="page-lead muted">Fast, encrypted payment. Your downloads unlock instantly on your account after successful payment.</p>
			</div>

			<div class="checkout-grid">
				<section class="checkout-panel card">
					<h4>Payment</h4>
					<form id="checkout-form">
						<div id="payment-element"></div>
						<button id="pay-button" class="btn" type="submit">Pay now</button>
						<p id="checkout-message" class="muted checkout-message" aria-live="polite"></p>
					</form>
				</section>

				<aside class="checkout-panel card">
					<h4>Order Summary</h4>
					<ul id="checkout-items" class="checkout-items"></ul>
					<div class="checkout-totals">
						<div class="checkout-row"><span>Subtotal</span><strong id="checkout-subtotal">$0</strong></div>
						<div class="checkout-row"><span>Promo</span><strong id="checkout-promo">None</strong></div>
						<div class="checkout-row checkout-row-total"><span>Total</span><strong id="checkout-total">$0</strong></div>
					</div>
				</aside>
			</div>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<small>© <span id="year"></span> Control-X — All lawful services.</small>
		</div>
	</footer>

	<script src="https://js.stripe.com/v3/"></script>
	<script src="script.js" defer></script>
	<script src="checkout.js" defer></script>
</body>
</html>
